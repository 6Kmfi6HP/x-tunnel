name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Coverage
        run: go test -cover ./...

      - name: Build
        run: go build -o x-tunnel .
