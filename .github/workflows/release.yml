name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.24.4"

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Validate tag
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-rc.1: ${RELEASE_TAG}" >&2
            exit 1
          fi
          git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Download modules
        run: go mod download

      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout=2m ./...

      - name: Race
        run: go test -race -count=1 -timeout=3m ./...

      - name: Release script smoke
        run: |
          TARGETS="linux/amd64" DIST=/tmp/x-tunnel-release-smoke VERSION="${RELEASE_TAG}" COMMIT="$(git rev-parse --short=12 HEAD)" BUILD_DATE=ci ./scripts/release.sh
          test -s /tmp/x-tunnel-release-smoke/SHA256SUMS

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: verify
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          VERSION="${RELEASE_TAG}" \
          COMMIT="$(git rev-parse --short=12 HEAD)" \
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          ./scripts/release.sh

      - name: Create or update GitHub release
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "x-tunnel ${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag
          fi

  container:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: verify
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${repo}"
          version="${RELEASE_TAG#v}"
          commit="$(git rev-parse --short=12 HEAD)"
          full_commit="$(git rev-parse HEAD)"

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "commit=${commit}"
            echo "full_commit=${full_commit}"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "tags<<TAGS"
            echo "${image}:${RELEASE_TAG}"
            echo "${image}:${version}"
            echo "${image}:sha-${commit}"
            if [[ "${version}" != *-* ]]; then
              IFS=. read -r major minor patch <<<"${version}"
              echo "${image}:${major}.${minor}"
              echo "${image}:${major}"
              echo "${image}:latest"
            fi
            echo "TAGS"
          } >>"${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=x-tunnel
            org.opencontainers.image.description=WebSocket tunnel with SOCKS5, HTTP proxy, and TCP forwarding listeners.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.full_commit }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
            COMMIT=${{ steps.image.outputs.commit }}
            BUILD_DATE=${{ steps.image.outputs.created }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
